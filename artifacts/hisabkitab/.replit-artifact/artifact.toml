kind = "web"
previewPath = "/"
title = "HisabKitab"
version = "1.0.0"
id = "artifacts/hisabkitab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25967

[services.development]
run = "pnpm --filter @workspace/hisabkitab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hisabkitab", "run", "build" ]
publicDir = "artifacts/hisabkitab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25967"
BASE_PATH = "/"
